service: linkedin-post-generator-backend
configValidationMode: error

provider:
  name: aws
  region: ${opt:region, 'us-east-2'}
  stage: ${opt:stage, 'dev'}
  architecture: x86_64
  memorySize: 2048
  timeout: 30
  logRetentionInDays: 14
  httpApi:
    cors: true
  ecr:
    images:
      api:
        path: ./
        file: Dockerfile.lambda
  environment:
    APP_ENV: ${sls:stage}
    API_LIST_LIMIT: ${env:API_LIST_LIMIT, '10'}
    DYNAMODB_TABLE_PREFIX: ${self:custom.tablePrefix}
    DYNAMODB_AUTO_CREATE_TABLES: 'false'
    SCRAPE_ENGINE: ${env:SCRAPE_ENGINE, 'extension'}
    SCRAPING_ENABLED: ${param:scrapingEnabled, 'false'}
    SCRAPE_MAX_WORKERS: ${env:SCRAPE_MAX_WORKERS, '2'}
    SCRAPE_INTER_CREATOR_DELAY_MIN_SECONDS: ${env:SCRAPE_INTER_CREATOR_DELAY_MIN_SECONDS, '0'}
    SCRAPE_INTER_CREATOR_DELAY_MAX_SECONDS: ${env:SCRAPE_INTER_CREATOR_DELAY_MAX_SECONDS, '120'}
    SCRAPE_LONG_BREAK_EVERY_CREATORS: ${env:SCRAPE_LONG_BREAK_EVERY_CREATORS, '10'}
    SCRAPE_LONG_BREAK_MIN_SECONDS: ${env:SCRAPE_LONG_BREAK_MIN_SECONDS, '240'}
    SCRAPE_LONG_BREAK_MAX_SECONDS: ${env:SCRAPE_LONG_BREAK_MAX_SECONDS, '420'}
    EXTENSION_SCRAPE_TASK_TIMEOUT_SECONDS: ${env:EXTENSION_SCRAPE_TASK_TIMEOUT_SECONDS, '300'}
    EXTENSION_SCRAPE_TASK_LEASE_SECONDS: ${env:EXTENSION_SCRAPE_TASK_LEASE_SECONDS, '120'}
    EXTENSION_API_TOKEN: ${env:EXTENSION_API_TOKEN, ''}
    BRAINSTORM_WORKER_FUNCTION_NAME: ${self:service}-${sls:stage}-brainstormWorker
    SCRAPE_WORKER_FUNCTION_NAME: ${self:service}-${sls:stage}-scrapeWorker
    DEFAULT_LLM_PROVIDER: ${env:DEFAULT_LLM_PROVIDER, 'gemini'}
    DEFAULT_LLM_MODEL: ${env:DEFAULT_LLM_MODEL, 'gemini-3.1-flash-lite'}
    GROQ_API_KEY: ${env:GROQ_API_KEY, ''}
    GOOGLE_API_KEY: ${env:GOOGLE_API_KEY, ''}
    ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY, ''}
    OPENAI_API_KEY: ${env:OPENAI_API_KEY, ''}
    TAVILY_API_KEY: ${env:TAVILY_API_KEY, ''}
    TAVILY_SEARCH_RESULTS: ${env:TAVILY_SEARCH_RESULTS, '5'}
    TAVILY_POST_SEARCH_COUNT: ${env:TAVILY_POST_SEARCH_COUNT, '6'}
    TAVILY_RESULTS_PER_QUERY: ${env:TAVILY_RESULTS_PER_QUERY, '3'}
    LINKEDIN_AUTOMATION_MODE: disabled
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:DescribeTable
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - Fn::GetAtt:
                - AppTable
                - Arn
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource:
            - arn:aws:lambda:${aws:region}:${aws:accountId}:function:${self:service}-${sls:stage}-brainstormWorker
            - arn:aws:lambda:${aws:region}:${aws:accountId}:function:${self:service}-${sls:stage}-scrapeWorker

custom:
  tablePrefix: linkedin_post_generator_${sls:stage}

functions:
  api:
    image:
      name: api
    events:
      - httpApi:
          method: '*'
          path: /
      - httpApi:
          method: '*'
          path: /{proxy+}
  brainstormWorker:
    timeout: 900
    image:
      name: api
      command:
        - app.brainstorm_worker.handler
  scrapeWorker:
    timeout: 900
    image:
      name: api
      command:
        - app.scrape_worker.handler

resources:
  Resources:
    AppTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:custom.tablePrefix}_app
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
