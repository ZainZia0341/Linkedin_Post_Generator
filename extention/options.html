<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Spark Scraper Settings</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      body { min-width: 0; }
      main { max-width: 620px; margin: 30px auto; }
      .actions { justify-content: flex-end; }
    </style>
  </head>
  <body>
    <main>
      <h1>AI Spark Scraper Settings</h1>
      <p>Connect this Chrome profile to the FastAPI backend that owns the scrape jobs.</p>

      <section class="settings-card">
        <label class="field">
          Backend URL
          <input id="backendUrl" type="url" placeholder="http://localhost:7860" required>
        </label>
        <label class="field">
          Application user ID
          <input id="userId" type="text" placeholder="test-user-1" required>
        </label>
        <label class="field">
          Extension API token
          <input id="apiToken" type="password" autocomplete="off" placeholder="Optional for local development">
        </label>
        <p>The token must match <code>EXTENSION_API_TOKEN</code> in the backend environment. Both may be blank locally.</p>
        <div id="message" class="message"></div>
        <div class="actions">
          <button id="testConnection" type="button">Test connection</button>
          <button id="save" class="primary" type="button">Save settings</button>
        </div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
